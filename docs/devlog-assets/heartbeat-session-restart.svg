<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" role="img">
  <title>私人FM 会话跨重启：持久化其实卡在主进程 IPC 白名单</title>
  <desc>会话经 platform.setStore → preload IPC → 主进程 electron/ipc/store.ts 的 if-链白名单 → electron-store 文件。之前白名单没有 heartbeat 分支，setStore 静默丢弃、getStore 返回 undefined，所以 loadSession 恒为 active:false、重启后恢复被拒。现在补上三个 key 的 get/set/clear 分支 + Store 实例，落盘/取回打通，restoreSession 才能接着放。</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b0504a"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a7f37"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="659" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="34" y="32" font-size="17" font-weight="700" fill="#1f2328">私人FM 会话跨重启：持久化其实卡在主进程 IPC 白名单</text>

  <!-- 共用的写入前段（renderer → preload），两栏共享，画在顶部 -->
  <text x="34" y="58" font-size="12" font-weight="600" fill="#57606a">写入（关程序前 · start / stop / maybeTopup 触发）——前三段两栏一样：</text>
  <g font-size="10" text-anchor="middle">
    <rect x="34" y="66" width="180" height="40" rx="7" fill="#eef3fb" stroke="#b9ccec"/>
    <text x="124" y="84" fill="#1a2b45" font-weight="600">persistSession()</text>
    <text x="124" y="98" fill="#5b6470" font-family="monospace">store/heartbeat.ts</text>

    <line x1="216" y1="86" x2="246" y2="86" stroke="#57606a" stroke-width="1.6" marker-end="url(#ar)"/>
    <rect x="248" y="66" width="180" height="40" rx="7" fill="#eef3fb" stroke="#b9ccec"/>
    <text x="338" y="84" fill="#1a2b45" font-weight="600">platform.setStore</text>
    <text x="338" y="98" fill="#5b6470" font-family="monospace">= window.electron</text>

    <line x1="430" y1="86" x2="460" y2="86" stroke="#57606a" stroke-width="1.6" marker-end="url(#ar)"/>
    <rect x="462" y="66" width="200" height="40" rx="7" fill="#eef3fb" stroke="#b9ccec"/>
    <text x="562" y="84" fill="#1a2b45" font-weight="600">preload：ipcRenderer</text>
    <text x="562" y="98" fill="#5b6470" font-family="monospace">.invoke(store.set)</text>

    <line x1="664" y1="86" x2="694" y2="86" stroke="#57606a" stroke-width="1.6" marker-end="url(#ar)"/>
    <rect x="696" y="66" width="170" height="40" rx="7" fill="#fff8e6" stroke="#e0cba0"/>
    <text x="781" y="84" fill="#7a5410" font-weight="600">主进程 store.set</text>
    <text x="781" y="98" fill="#8a6a2a" font-family="monospace">if-链白名单</text>
  </g>
  <text x="781" y="120" font-size="9.5" text-anchor="middle" fill="#8a6a2a" font-family="monospace">electron/ipc/store.ts</text>
  <line x1="781" y1="124" x2="781" y2="146" stroke="#57606a" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="781" y="140" font-size="10" text-anchor="middle" fill="#57606a">按 key 分发 ↓</text>

  <!-- 两栏：之前 / 现在 -->
  <!-- 之前 -->
  <rect x="34" y="150" width="404" height="470" rx="10" fill="#fdf3f1" stroke="#e6b8a8"/>
  <text x="52" y="176" font-size="14" font-weight="700" fill="#b0504a">之前：白名单没有 heartbeat 分支</text>

  <g font-size="10.5" text-anchor="middle">
    <rect x="52" y="190" width="368" height="46" rx="7" fill="#fbece8" stroke="#e6b8a8"/>
    <text x="236" y="210" fill="#7a3a28" font-weight="600">store.set / store.get 的 if 链里</text>
    <text x="236" y="226" fill="#7a3a28">没有 <tspan font-family="monospace">HeartbeatSession</tspan> 这一支</text>
  </g>
  <line x1="236" y1="236" x2="236" y2="256" stroke="#b0504a" stroke-width="1.8" marker-end="url(#arR)"/>

  <g font-size="10.5" text-anchor="middle">
    <rect x="52" y="258" width="368" height="42" rx="7" fill="#f7dcd4" stroke="#cf9a8c"/>
    <text x="236" y="284" fill="#7a3a28" font-weight="600">setStore 静默丢弃（🕳 什么都没写进磁盘）</text>
  </g>

  <text x="52" y="326" font-size="12" font-weight="600" fill="#b0504a">重启后读取：</text>
  <g font-size="10.5" text-anchor="middle">
    <rect x="52" y="336" width="368" height="40" rx="7" fill="#fbece8" stroke="#e6b8a8"/>
    <text x="236" y="361" fill="#7a3a28"><tspan font-family="monospace">getStore</tspan> → 白名单无分支 → <tspan font-family="monospace">undefined</tspan></text>
  </g>
  <line x1="236" y1="376" x2="236" y2="394" stroke="#b0504a" stroke-width="1.8" marker-end="url(#arR)"/>
  <g font-size="10.5" text-anchor="middle">
    <rect x="52" y="396" width="368" height="40" rx="7" fill="#fbece8" stroke="#e6b8a8"/>
    <text x="236" y="421" fill="#7a3a28"><tspan font-family="monospace">loadSession()</tspan> 恒为 <tspan font-family="monospace">{ active:false }</tspan></text>
  </g>
  <line x1="236" y1="436" x2="236" y2="454" stroke="#b0504a" stroke-width="1.8" marker-end="url(#arR)"/>
  <g font-size="10.5" text-anchor="middle">
    <rect x="52" y="456" width="368" height="40" rx="7" fill="#fbece8" stroke="#e6b8a8"/>
    <text x="236" y="481" fill="#7a3a28"><tspan font-family="monospace">restoreSession</tspan> 第 2 行就 return（恢复被拒）</text>
  </g>
  <line x1="236" y1="496" x2="236" y2="514" stroke="#b0504a" stroke-width="1.8" marker-end="url(#arR)"/>
  <rect x="52" y="516" width="368" height="86" rx="8" fill="#f7dcd4" stroke="#cf9a8c"/>
  <text x="236" y="540" font-size="11.5" text-anchor="middle" fill="#7a3a28" font-weight="600">点私人FM → isSessionLive() 为 false → 重开一轮 ✗</text>
  <text x="236" y="562" font-size="10" text-anchor="middle" fill="#7a3a28">（play-list 走 localStorage，队列本身还在、还能放，</text>
  <text x="236" y="578" font-size="10" text-anchor="middle" fill="#7a3a28">但续供没挂 → 播完只 Loop 这几十首、不再推新）</text>
  <text x="236" y="595" font-size="10" text-anchor="middle" fill="#b0504a" font-weight="600">← 你实测到的现象</text>

  <!-- 现在 -->
  <rect x="462" y="150" width="404" height="470" rx="10" fill="#eef7f0" stroke="#b9dcc4"/>
  <text x="480" y="176" font-size="14" font-weight="700" fill="#1a7f37">现在：补上三个 key 的分支 + Store 实例</text>

  <g font-size="10.5" text-anchor="middle">
    <rect x="480" y="190" width="368" height="46" rx="7" fill="#e6f4ea" stroke="#2da44e"/>
    <text x="664" y="210" fill="#153524" font-weight="600">get/set/clear 各加 3 支</text>
    <text x="664" y="226" fill="#3a6b47"><tspan font-family="monospace">HeartbeatServed / FavSeeds / Session</tspan></text>
  </g>
  <line x1="664" y1="236" x2="664" y2="256" stroke="#1a7f37" stroke-width="1.8" marker-end="url(#arG)"/>
  <g font-size="10.5" text-anchor="middle">
    <rect x="480" y="258" width="368" height="42" rx="7" fill="#caf0d6" stroke="#1a7f37"/>
    <text x="664" y="278" fill="#0f5026" font-weight="600">→ heartbeatSessionStore（electron-store）</text>
    <text x="664" y="293" fill="#3a6b47" font-family="monospace">electron/store.ts → 磁盘文件</text>
  </g>

  <text x="480" y="326" font-size="12" font-weight="600" fill="#1a7f37">重启后读取：</text>
  <g font-size="10.5" text-anchor="middle">
    <rect x="480" y="336" width="368" height="40" rx="7" fill="#e6f4ea" stroke="#2da44e"/>
    <text x="664" y="361" fill="#153524"><tspan font-family="monospace">getStore</tspan> → 命中分支 → 取回文件内容</text>
  </g>
  <line x1="664" y1="376" x2="664" y2="394" stroke="#1a7f37" stroke-width="1.8" marker-end="url(#arG)"/>
  <g font-size="10.5" text-anchor="middle">
    <rect x="480" y="396" width="368" height="40" rx="7" fill="#e6f4ea" stroke="#2da44e"/>
    <text x="664" y="421" fill="#153524"><tspan font-family="monospace">loadSession</tspan> = <tspan font-family="monospace">{ active:true, sessionIds }</tspan></text>
  </g>
  <line x1="664" y1="436" x2="664" y2="454" stroke="#1a7f37" stroke-width="1.8" marker-end="url(#arG)"/>
  <g font-size="10.5" text-anchor="middle">
    <rect x="480" y="456" width="368" height="40" rx="7" fill="#e6f4ea" stroke="#2da44e"/>
    <text x="664" y="481" fill="#153524">队列里仍有这些 id → 恢复三件套</text>
  </g>
  <line x1="664" y1="496" x2="664" y2="514" stroke="#1a7f37" stroke-width="1.8" marker-end="url(#arG)"/>
  <rect x="480" y="516" width="368" height="86" rx="8" fill="#caf0d6" stroke="#1a7f37"/>
  <text x="664" y="537" font-size="10.5" text-anchor="middle" fill="#0f5026">① 恢复 active+sessionIds　② 重挂续供 attachTopup()</text>
  <text x="664" y="554" font-size="10.5" text-anchor="middle" fill="#0f5026">③ 载回已推历史（续供去重）</text>
  <text x="664" y="578" font-size="11.5" text-anchor="middle" fill="#0f5026" font-weight="600">点私人FM → 接着放 · 队尾续上新歌 ✓</text>
  <text x="664" y="595" font-size="10" text-anchor="middle" fill="#3a6b47">（退出前若已点别的歌单 → 队列被替换 → 仍重开一轮）</text>
</svg>
