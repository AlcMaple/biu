  <!-- note -->
  <text x="22" y="180" font-size="11.5" fill="#6b6b66">去程用清洗后的标题搜网易（不带 UP 名）　·　回程相似歌名回搜 B站并过单曲净化　·　任一步失败 → 静默返空；回程撞 -412/-352 → 熔断 10min</text>
