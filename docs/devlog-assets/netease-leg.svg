  <!-- box 3 -->
  <rect x="497" y="66" width="165" height="72" rx="8" fill="#f3eefb" stroke="#cbb9ec"/>
  <text x="579" y="98" font-size="12.5" fill="#2c1a45" text-anchor="middle" font-weight="600">相似歌名 × K</text>
