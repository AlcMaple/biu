  </defs>
  <rect x="1" y="1" width="918" height="208" rx="12" fill="#fbfbfa" stroke="#e4e4e2"/>
  <text x="22" y="32" font-size="15" font-weight="700" fill="#2c1a45">Phase 2 · 网易腿：两道模糊匹配（同曲风 · 异歌手）</text>

  <!-- box 1 -->
  <rect x="15" y="66" width="165" height="72" rx="8" fill="#fff" stroke="#cfcfcb"/>
