<!doctype html>
<html lang="zh-CN" class="bg-background text-foreground">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="windows music application" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biu</title>
    <!--
      透明窗口（桌面歌词 / 迷你播放器）共享同一 HTML 模板，html/body 上的
      bg-background 会在 React 挂载前先画出一块不透明底色 —— 表现为打开窗口时
      的白色闪烁。这里在解析到 head 时就根据 hash 给 html 加 data 属性，
      内联 CSS 同步把 html/body 钉死为透明，保证首帧就是透明的。
    -->
    <script>
      (function () {
        var h = location.hash.replace(/^#/, "");
        if (h === "desktop-lyrics" || h === "mini-player") {
          document.documentElement.setAttribute("data-transparent-window", "");
        }
      })();
    </script>
    <style>
      html[data-transparent-window],
      html[data-transparent-window] body {
        background: transparent !important;
      }
    </style>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
  </body>
</html>
